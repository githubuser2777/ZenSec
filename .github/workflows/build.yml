name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Tidy Dependencies
      run: go mod tidy

    - name: Build
      run: go build -v ./cmd/zensec/...

    - name: Test
      run: go test -v ./internal/crypto/...
